<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Карманный Доктор — Меню</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--tg-theme-bg-color, #0d0d0d);
      color: var(--tg-theme-text-color, #ffffff);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px 30px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header .icon {
      font-size: 52px;
      display: block;
      margin-bottom: 8px;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(0,212,255,0.4)); }
      50%       { transform: scale(1.06); filter: drop-shadow(0 0 20px rgba(0,212,255,0.8)); }
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    .btn-list {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      width: 100%;
      min-height: 74px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(0, 212, 255, 0.07);
      border: 1.5px solid rgba(0, 212, 255, 0.22);
      border-radius: 18px;
      cursor: pointer;
      text-align: left;
      color: #fff;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, background 0.15s, border-color 0.15s, box-shadow 0.15s;
      animation: slideIn 0.35s both;
      -webkit-appearance: none;
    }

    .btn:nth-child(1) { animation-delay: 0.05s; }
    .btn:nth-child(2) { animation-delay: 0.12s; }
    .btn:nth-child(3) { animation-delay: 0.19s; }
    .btn:nth-child(4) { animation-delay: 0.26s; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn:active {
      transform: scale(0.96);
      background: rgba(0, 212, 255, 0.18);
      border-color: rgba(0, 212, 255, 0.55);
      box-shadow: 0 0 18px rgba(0, 212, 255, 0.25);
    }

    .btn.primary {
      background: rgba(0, 212, 255, 0.13);
      border-color: rgba(0, 212, 255, 0.45);
    }

    .btn-emoji {
      font-size: 34px;
      flex-shrink: 0;
      width: 50px;
      text-align: center;
    }

    .btn-label {
      flex: 1;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.2px;
    }

    .btn.primary .btn-label {
      color: #00d4ff;
    }

    .btn-arrow {
      font-size: 22px;
      color: rgba(255,255,255,0.3);
      flex-shrink: 0;
    }

    .disclaimer {
      margin-top: 22px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      line-height: 1.6;
      max-width: 320px;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="icon">🏥</span>
    <h1>Карманный Доктор</h1>
    <p>Выберите действие</p>
  </div>

  <div class="btn-list">
    <button class="btn primary" onclick="send('symptom')">
      <span class="btn-emoji">🤒</span>
      <span class="btn-label">Описать симптомы</span>
      <span class="btn-arrow">›</span>
    </button>

    <button class="btn" onclick="send('file')">
      <span class="btn-emoji">📄</span>
      <span class="btn-label">Загрузить анализы</span>
      <span class="btn-arrow">›</span>
    </button>

    <button class="btn" onclick="send('photo')">
      <span class="btn-emoji">📷</span>
      <span class="btn-label">Сфотографировать анализы</span>
      <span class="btn-arrow">›</span>
    </button>

    <button class="btn" onclick="send('history')">
      <span class="btn-emoji">📋</span>
      <span class="btn-label">История консультаций</span>
      <span class="btn-arrow">›</span>
    </button>
  </div>

  <p class="disclaimer">
    Информационная консультация.<br>
    Не заменяет визит к врачу.
  </p>

  <script>
    var tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    function send(action) {
      // haptic feedback
      if (tg && tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('medium');
      }

      if (tg) {
        tg.sendData(action);
      } else {
        // fallback for browser preview
        alert('Действие: ' + action);
      }
    }
  </script>
</body>
</html>
