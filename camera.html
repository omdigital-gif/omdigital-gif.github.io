<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Фото документа — Карманный Юрист</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: -apple-system, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }
        h3 { font-size: 20px; margin-bottom: 8px; }
        #status {
            font-size: 14px;
            color: #aaa;
            text-align: center;
            margin: 10px 0 20px;
            min-height: 20px;
        }
        .btn {
            width: 100%;
            max-width: 340px;
            padding: 18px;
            font-size: 17px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            margin: 8px 0;
            font-weight: bold;
            display: block;
        }
        .btn-camera { background: #00d4ff; color: #000; }
        .btn-send { background: #00cc66; color: #000; display: none; }
        .btn-retry { background: #444; color: #fff; display: none; font-weight: normal; }
        #preview {
            max-width: 100%;
            max-height: 320px;
            border-radius: 10px;
            margin: 16px 0 8px;
            display: none;
            border: 2px solid #00d4ff;
        }
        #loader { display: none; color: #00d4ff; font-size: 15px; margin: 12px 0; }
        .hint { font-size: 12px; color: #666; text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
    <h3>📷 Фото документа</h3>
    <p id="status">Нажмите кнопку — откроется камера</p>

    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

    <button class="btn btn-camera" id="cameraBtn" onclick="openCamera()">📷 Открыть камеру</button>
    <img id="preview" alt="Предпросмотр">
    <button class="btn btn-send" id="sendBtn" onclick="sendPhoto()">✅ Отправить на анализ</button>
    <button class="btn btn-retry" id="retryBtn" onclick="openCamera()">🔄 Переснять</button>
    <p id="loader">⏳ Загружаю и отправляю...</p>
    <p class="hint">Сделайте чёткое фото при хорошем освещении</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        try { tg.setBackgroundColor('#1a1a2e'); } catch(e) {}

        let photoBlob = null;

        function openCamera() {
            document.getElementById('cameraInput').value = '';
            document.getElementById('cameraInput').click();
        }

        document.getElementById('cameraInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            setStatus('Обрабатываю фото...');
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('preview').style.display = 'none';

            const reader = new FileReader();
            reader.onload = function(evt) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const maxSize = 1400;
                    if (w > maxSize || h > maxSize) {
                        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                        else { w = Math.round(w * maxSize / h); h = maxSize; }
                    }
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(function(blob) {
                        photoBlob = blob;
                        const preview = document.getElementById('preview');
                        preview.src = URL.createObjectURL(blob);
                        preview.style.display = 'block';
                        document.getElementById('sendBtn').style.display = 'block';
                        document.getElementById('retryBtn').style.display = 'block';
                        setStatus('Фото готово — проверьте чёткость');
                    }, 'image/jpeg', 0.82);
                };
                img.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function sendPhoto() {
            if (!photoBlob) return;

            document.getElementById('sendBtn').disabled = true;
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            setStatus('Отправляю...');

            try {
                const formData = new FormData();
                formData.append('file', photoBlob, 'document.jpg');

                const uploadResp = await fetch('https://telegra.ph/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!uploadResp.ok) throw new Error('upload_error');
                const uploadResult = await uploadResp.json();

                if (!Array.isArray(uploadResult) || !uploadResult[0] || !uploadResult[0].src) {
                    throw new Error('bad_response');
                }

                const imageUrl = 'https://telegra.ph' + uploadResult[0].src;
                tg.sendData(JSON.stringify({ type: 'photo_url', url: imageUrl }));

                setStatus('Отправлено! Анализирую...');
                document.getElementById('loader').style.display = 'none';
                setTimeout(() => tg.close(), 1200);

            } catch (err) {
                document.getElementById('loader').style.display = 'none';
                setStatus('Ошибка отправки. Попробуйте ещё раз.');
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('retryBtn').style.display = 'block';
                console.error(err);
            }
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }
    </script>
</body>
</html>
