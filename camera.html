<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Фото документа — Карманный Юрист</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: -apple-system, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }
        h3 { font-size: 18px; margin-bottom: 6px; }
        #status { font-size: 13px; color: #aaa; text-align: center; margin: 8px 0 14px; min-height: 18px; }
        .btn {
            width: 100%; max-width: 340px;
            padding: 16px; font-size: 16px;
            border: none; border-radius: 12px;
            cursor: pointer; margin: 6px 0;
            font-weight: bold; display: block;
        }
        .btn-camera { background: #00d4ff; color: #000; }
        .btn-send   { background: #00cc66; color: #000; display: none; }
        .btn-retry  { background: #444; color: #fff; display: none; font-weight: normal; }
        #videoWrap {
            width: 100%; max-width: 340px;
            border-radius: 12px; overflow: hidden;
            border: 2px solid #00d4ff;
            margin: 8px 0; display: none;
        }
        video { width: 100%; display: block; }
        #preview {
            max-width: 100%; max-height: 280px;
            border-radius: 10px; margin: 8px 0;
            display: none; border: 2px solid #00d4ff;
        }
        canvas { display: none; }
        #loader { display: none; color: #00d4ff; font-size: 14px; margin: 8px 0; }
        .hint { font-size: 11px; color: #555; text-align: center; margin-top: 12px; }
    </style>
</head>
<body>
    <h3>📷 Фото документа</h3>
    <p id="status">Запуск камеры...</p>

    <!-- Прямая камера через getUserMedia -->
    <div id="videoWrap">
        <video id="videoEl" playsinline autoplay muted></video>
    </div>
    <button class="btn btn-camera" id="snapBtn" onclick="snapPhoto()" style="display:none">📷 Сделать фото</button>

    <!-- Fallback: системный выбор файла/камеры -->
    <input type="file" id="fileInput" accept="image/*" capture="camera" style="display:none">
    <button class="btn btn-camera" id="fallbackBtn" onclick="openFallback()" style="display:none">📷 Открыть камеру</button>
    <button class="btn btn-camera" id="galleryBtn" onclick="openGallery()" style="display:none; background:#666;">🖼 Выбрать из галереи</button>

    <canvas id="canvas"></canvas>
    <img id="preview" alt="Предпросмотр">
    <button class="btn btn-send" id="sendBtn" onclick="sendPhoto()">✅ Отправить на анализ</button>
    <button class="btn btn-retry" id="retryBtn" onclick="retakePhoto()">🔄 Переснять</button>
    <p id="loader">⏳ Отправляю...</p>
    <p class="hint">Держите ровно, текст должен быть чётким</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        try { tg.setBackgroundColor('#1a1a2e'); } catch(e) {}

        let photoBlob = null;
        let mediaStream = null;

        async function initCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showFallback();
                return;
            }
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 960 } },
                    audio: false
                });
                const video = document.getElementById('videoEl');
                video.srcObject = mediaStream;
                await video.play();
                document.getElementById('videoWrap').style.display = 'block';
                document.getElementById('snapBtn').style.display = 'block';
                setStatus('Наведите камеру на документ и нажмите кнопку');
            } catch(e) {
                showFallback();
            }
        }

        function showFallback() {
            document.getElementById('fallbackBtn').style.display = 'block';
            document.getElementById('galleryBtn').style.display = 'block';
            setStatus('Выберите способ добавить фото');
        }

        function snapPhoto() {
            const video = document.getElementById('videoEl');
            const canvas = document.getElementById('canvas');
            canvas.width  = video.videoWidth  || 1280;
            canvas.height = video.videoHeight || 960;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            stopStream();
            canvas.toBlob(blob => {
                photoBlob = blob;
                showPreview(blob);
            }, 'image/jpeg', 0.85);
        }

        function stopStream() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            document.getElementById('videoWrap').style.display = 'none';
            document.getElementById('snapBtn').style.display = 'none';
        }

        function openFallback() {
            document.getElementById('fileInput').setAttribute('capture', 'camera');
            document.getElementById('fileInput').click();
        }

        function openGallery() {
            document.getElementById('fileInput').removeAttribute('capture');
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            setStatus('Обрабатываю...');
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    let w = img.width, h = img.height;
                    const maxSize = 1400;
                    if (w > maxSize || h > maxSize) {
                        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                        else { w = Math.round(w * maxSize / h); h = maxSize; }
                    }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(blob => {
                        photoBlob = blob;
                        showPreview(blob);
                    }, 'image/jpeg', 0.82);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        function showPreview(blob) {
            document.getElementById('fallbackBtn').style.display = 'none';
            document.getElementById('galleryBtn').style.display = 'none';
            const preview = document.getElementById('preview');
            preview.src = URL.createObjectURL(blob);
            preview.style.display = 'block';
            document.getElementById('sendBtn').style.display = 'block';
            document.getElementById('retryBtn').style.display = 'block';
            setStatus('Фото готово — проверьте чёткость');
        }

        function retakePhoto() {
            photoBlob = null;
            document.getElementById('preview').style.display = 'none';
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('fileInput').value = '';
            initCamera();
        }

        async function sendPhoto() {
            if (!photoBlob) return;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            setStatus('Отправляю...');
            try {
                const formData = new FormData();
                formData.append('file', photoBlob, 'document.jpg');
                const resp = await fetch('https://telegra.ph/upload', { method: 'POST', body: formData });
                if (!resp.ok) throw new Error('upload_failed');
                const result = await resp.json();
                if (!Array.isArray(result) || !result[0] || !result[0].src) throw new Error('bad_response');
                const imageUrl = 'https://telegra.ph' + result[0].src;
                tg.sendData(JSON.stringify({ type: 'photo_url', url: imageUrl }));
                setStatus('Отправлено! Анализирую...');
                document.getElementById('loader').style.display = 'none';
                setTimeout(() => tg.close(), 1200);
            } catch(err) {
                document.getElementById('loader').style.display = 'none';
                setStatus('Ошибка. Попробуйте ещё раз.');
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('retryBtn').style.display = 'block';
            }
        }

        function setStatus(text) { document.getElementById('status').textContent = text; }

        // Запускаем камеру при загрузке страницы
        initCamera();
    </script>
</body>
</html>
