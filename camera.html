    <title>Фото документа — Карманный Юрист</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a2e; color: #fff;
            font-family: -apple-system, Arial, sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; padding: 16px;
        }
        h3 { font-size: 18px; margin-bottom: 6px; }
        #status { font-size: 13px; color: #aaa; text-align: center; margin: 8px 0 12px; }
        .btn {
            width: 100%; max-width: 340px;
            padding: 16px; font-size: 16px;
            border: none; border-radius: 12px;
            cursor: pointer; margin: 6px 0;
            font-weight: bold; display: block;
        }
        .btn-blue   { background: #00d4ff; color: #000; }
        .btn-green  { background: #00cc66; color: #000; display: none; }
        .btn-grey   { background: #444; color: #fff; font-weight: normal; display: none; }
        #videoWrap {
            width: 100%; max-width: 340px;
            border-radius: 12px; overflow: hidden;
            border: 2px solid #00d4ff;
            margin: 8px 0; display: none;
            background: #000;
        }
        video { width: 100%; display: block; max-height: 260px; object-fit: cover; }
        #preview {
            max-width: 100%; max-height: 260px;
            border-radius: 10px; margin: 8px 0;
            display: none; border: 2px solid #00d4ff;
        }
        canvas { display: none; }
        #loader { display: none; color: #00d4ff; font-size: 14px; margin: 8px 0; }
        .info-box {
            background: #0d1117; border: 1px solid #333;
            border-radius: 10px; padding: 12px 14px;
            font-size: 12px; color: #999; line-height: 1.6;
            max-width: 340px; margin: 8px 0; display: none;
        }
        .info-box b { color: #ccc; }
        .hint { font-size: 11px; color: #444; text-align: center; margin-top: 10px; }
    </style>

</head>
<body>
    <h3>📷 Фото документа</h3>
    <p id="status">Запускаю камеру...</p>

    <!-- 1. getUserMedia — прямая камера внутри страницы -->
    <div id="videoWrap">
        <video id="videoEl" playsinline autoplay muted></video>
    </div>
    <button class="btn btn-blue" id="snapBtn" onclick="snapPhoto()" style="display:none">📷 Сделать фото</button>

    <!-- 2. Fallback — file input с capture -->
    <input type="file" id="fileCapture" accept="image/*" capture="camera" style="display:none">
    <input type="file" id="fileGallery" accept="image/*" style="display:none">
    <button class="btn btn-blue" id="captureBtn" onclick="openCapture()" style="display:none">📷 Открыть камеру</button>
    <button class="btn btn-grey" id="galleryBtn" onclick="openGallery()">🖼 Из галереи</button>

    <!-- Инструкция если всё блокируется -->
    <div class="info-box" id="permInfo">
        <b>Камера не открывается?</b><br>
        Разрешите доступ к камере для Telegram:<br>
        Настройки → Приложения → Telegram → Разрешения → Камера → Разрешить<br><br>
        Или отправьте фото напрямую в чат через скрепку 📎
    </div>

    <!-- Preview и отправка -->
    <canvas id="canvas"></canvas>
    <img id="preview" alt="Предпросмотр">
    <button class="btn btn-green" id="sendBtn" onclick="sendPhoto()">✅ Отправить на анализ</button>
    <button class="btn btn-grey" id="retryBtn" onclick="retake()">🔄 Переснять</button>
    <p id="loader">⏳ Отправляю...</p>
    <p class="hint">Текст документа должен быть чётким и хорошо освещённым</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        try { tg.setBackgroundColor('#1a1a2e'); } catch(e) {}

        let photoBlob = null;
        let mediaStream = null;
        let gumFailed = false;

        async function initCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                onGumFailed('не поддерживается');
                return;
            }
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } },
                    audio: false
                });
                const video = document.getElementById('videoEl');
                video.srcObject = mediaStream;
                await video.play();
                document.getElementById('videoWrap').style.display = 'block';
                document.getElementById('snapBtn').style.display = 'block';
                document.getElementById('galleryBtn').style.display = 'none';
                setStatus('Наведите на документ и нажмите «Сделать фото»');
            } catch(e) {
                onGumFailed(e.name || 'ошибка');
            }
        }

        function onGumFailed(reason) {
            gumFailed = true;
            document.getElementById('captureBtn').style.display = 'block';
            document.getElementById('galleryBtn').style.display = 'block';
            if (reason === 'NotAllowedError') {
                setStatus('Нет разрешения на камеру — см. инструкцию ниже');
                document.getElementById('permInfo').style.display = 'block';
            } else {
                setStatus('Выберите способ добавить фото');
            }
        }

        function snapPhoto() {
            const video = document.getElementById('videoEl');
            const canvas = document.getElementById('canvas');
            canvas.width  = video.videoWidth  || 1280;
            canvas.height = video.videoHeight || 960;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            stopStream();
            canvas.toBlob(blob => { photoBlob = blob; showPreview(blob); }, 'image/jpeg', 0.85);
        }

        function stopStream() {
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            document.getElementById('videoWrap').style.display = 'none';
            document.getElementById('snapBtn').style.display = 'none';
        }

        function openCapture() { document.getElementById('fileCapture').click(); }
        function openGallery() { document.getElementById('fileGallery').click(); }

        function handleFileInput(e) {
            const file = e.target.files[0];
            if (!file) return;
            setStatus('Обрабатываю...');
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    let w = img.width, h = img.height;
                    const maxSize = 1400;
                    if (w > maxSize || h > maxSize) {
                        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                        else { w = Math.round(w * maxSize / h); h = maxSize; }
                    }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(blob => { photoBlob = blob; showPreview(blob); }, 'image/jpeg', 0.82);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('fileCapture').addEventListener('change', handleFileInput);
        document.getElementById('fileGallery').addEventListener('change', handleFileInput);

        function showPreview(blob) {
            document.getElementById('captureBtn').style.display = 'none';
            document.getElementById('galleryBtn').style.display = 'none';
            document.getElementById('permInfo').style.display = 'none';
            const preview = document.getElementById('preview');
            preview.src = URL.createObjectURL(blob);
            preview.style.display = 'block';
            document.getElementById('sendBtn').style.display = 'block';
            document.getElementById('retryBtn').style.display = 'block';
            setStatus('Фото готово — проверьте чёткость');
        }

        function retake() {
            photoBlob = null;
            document.getElementById('preview').style.display = 'none';
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('fileCapture').value = '';
            document.getElementById('fileGallery').value = '';
            if (gumFailed) {
                document.getElementById('captureBtn').style.display = 'block';
                document.getElementById('galleryBtn').style.display = 'block';
                setStatus('Выберите способ добавить фото');
            } else {
                initCamera();
            }
        }

        async function sendPhoto() {
            if (!photoBlob) return;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            setStatus('Отправляю...');
            try {
                const formData = new FormData();
                formData.append('file', photoBlob, 'document.jpg');
                const resp = await fetch('https://telegra.ph/upload', { method: 'POST', body: formData });
                if (!resp.ok) throw new Error('upload_failed');
                const result = await resp.json();
                if (!Array.isArray(result) || !result[0] || !result[0].src) throw new Error('bad_response');
                tg.sendData(JSON.stringify({ type: 'photo_url', url: 'https://telegra.ph' + result[0].src }));
                setStatus('Отправлено! Анализирую...');
                document.getElementById('loader').style.display = 'none';
                setTimeout(() => tg.close(), 1200);
            } catch(err) {
                document.getElementById('loader').style.display = 'none';
                setStatus('Ошибка отправки. Попробуйте ещё раз.');
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('retryBtn').style.display = 'block';
            }
        }

        function setStatus(t) { document.getElementById('status').textContent = t; }

        initCamera();
    </script>
</body>
</html>
